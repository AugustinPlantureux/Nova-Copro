services:
  - type: web
    name: nova-copro-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nova-copro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: nova-copro-db
    plan: starter
    databaseName: nova_copro
    user: nova_copro_user
